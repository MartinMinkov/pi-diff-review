<!doctype html>
<html lang="en" class="h-full bg-[#0d1117]">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pi response review</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-review-bg: #0d1117;
        --color-review-panel: #161b22;
        --color-review-panel-2: #11161d;
        --color-review-border: #30363d;
        --color-review-text: #c9d1d9;
        --color-review-muted: #8b949e;
        --color-review-accent: #58a6ff;
      }
    </style>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .scrollbar-thin::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 999px;
        border: 3px solid #161b22;
      }

      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }

      .response-surface {
        background:
          linear-gradient(180deg, rgba(88, 166, 255, 0.05), transparent 220px),
          #0d1117;
      }

      .response-content {
        line-height: 1.65;
        font-size: 15px;
      }

      .response-content h1,
      .response-content h2,
      .response-content h3 {
        color: #fff;
        line-height: 1.25;
        margin: 28px 0 12px;
      }

      .response-content h1 {
        font-size: 28px;
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
      }

      .response-content h2 {
        font-size: 22px;
      }

      .response-content h3 {
        font-size: 18px;
      }

      .response-content p {
        margin: 12px 0;
        white-space: pre-wrap;
      }

      .response-content pre {
        position: relative;
        overflow: auto;
        padding: 14px;
        background: #0b1016;
        border: 1px solid #30363d;
        border-radius: 10px;
        line-height: 1.45;
      }

      .response-content code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      .code-comment-button {
        position: absolute;
        top: 8px;
        right: 8px;
        opacity: 0;
        cursor: pointer;
        border: 1px solid #30363d;
        background: #11161d;
        color: #c9d1d9;
        border-radius: 8px;
        padding: 6px 9px;
        font-size: 12px;
        font-weight: 650;
      }

      pre:hover .code-comment-button {
        opacity: 1;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .search-match {
        background: rgba(210, 153, 34, 0.22);
        outline: 1px solid rgba(210, 153, 34, 0.36);
        border-radius: 3px;
      }

      ::selection {
        background: rgba(88, 166, 255, 0.35);
      }
    </style>
  </head>
  <body class="h-full overflow-hidden bg-review-bg text-review-text antialiased">
    <div class="flex h-full min-h-0 flex-col">
      <header
        class="flex items-center justify-between gap-4 border-b border-review-border bg-[#0b1016]/95 px-4 py-3"
      >
        <div class="min-w-0">
          <div class="text-[15px] font-bold text-white">Response review</div>
          <div class="mt-0.5 truncate text-[11px] text-review-muted">
            Select response text, add anchored feedback, then finish to insert a structured prompt into Pi.
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div
            id="status"
            class="max-w-[32rem] truncate text-xs text-review-accent"
          ></div>
          <button
            id="cancel-button"
            class="cursor-pointer rounded-lg border border-review-border bg-review-panel-2 px-3 py-1.5 text-xs font-semibold text-review-text hover:border-red-500/50 hover:bg-red-500/10 hover:text-red-300"
          >
            Cancel
          </button>
          <button
            id="submit-button"
            class="cursor-pointer rounded-lg border border-white/10 bg-[#238636] px-3 py-1.5 text-xs font-semibold text-white hover:bg-[#2ea043] disabled:cursor-default disabled:opacity-55"
          >
            Finish review
          </button>
        </div>
      </header>

      <main class="grid min-h-0 flex-1 grid-cols-[300px_minmax(420px,1fr)_360px]">
        <aside
          class="scrollbar-thin min-h-0 overflow-auto border-r border-review-border bg-review-bg/90"
        >
          <div class="border-b border-review-border p-3.5">
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Assistant responses
            </div>
            <input
              id="response-search"
              class="w-full rounded-lg border border-review-border bg-[#0b1016] px-2.5 py-2 text-sm text-review-text outline-none focus:border-review-accent"
              placeholder="Filter responses…"
            />
          </div>
          <div class="border-b border-review-border p-3.5">
            <div id="response-list" class="flex flex-col gap-2"></div>
          </div>
          <div class="border-b border-review-border p-3.5">
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Outline
            </div>
            <div id="outline-list" class="flex flex-col gap-1"></div>
          </div>
        </aside>

        <section class="response-surface flex min-h-0 min-w-0 flex-col">
          <div
            class="flex items-center justify-between gap-3 border-b border-review-border px-3.5 py-2.5"
          >
            <div class="min-w-0">
              <div
                id="active-title"
                class="truncate text-[13px] font-bold text-white"
              ></div>
              <div
                id="active-meta"
                class="mt-0.5 text-[11px] text-review-muted"
              ></div>
            </div>
            <div class="flex items-center gap-2">
              <button
                id="comment-selection-button"
                class="cursor-pointer rounded-lg border border-review-border bg-review-panel-2 px-3 py-1.5 text-xs font-semibold text-review-text hover:border-review-accent/60 hover:bg-[#18212c]"
                title="Comment selected response text (C)"
              >
                Comment selection
                <span
                  class="ml-1 rounded border border-review-border bg-[#0b1016] px-1.5 py-0.5 text-[11px] text-review-muted"
                  >C</span
                >
              </button>
              <button
                id="copy-selection-button"
                class="cursor-pointer rounded-lg border border-review-border bg-review-panel-2 px-3 py-1.5 text-xs font-semibold text-review-text hover:border-review-accent/60 hover:bg-[#18212c]"
              >
                Copy selection
              </button>
            </div>
          </div>
          <div
            id="response-scroll"
            class="scrollbar-thin min-h-0 flex-1 overflow-auto px-[min(6vw,64px)] py-7"
          >
            <article
              id="response-content"
              class="response-content mx-auto max-w-[920px]"
            ></article>
          </div>
        </section>

        <aside
          class="scrollbar-thin min-h-0 overflow-auto border-l border-review-border bg-review-bg/90"
        >
          <div class="border-b border-review-border p-3.5">
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Overall feedback
            </div>
            <textarea
              id="overall-comment"
              class="min-h-[88px] w-full resize-y rounded-lg border border-review-border bg-[#0b1016] px-2.5 py-2 text-sm leading-6 text-review-text outline-none focus:border-review-accent"
              placeholder="High-level feedback for the assistant…"
            ></textarea>
          </div>
          <div class="border-b border-review-border p-3.5">
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Draft / next prompt
            </div>
            <textarea
              id="draft"
              class="min-h-[88px] w-full resize-y rounded-lg border border-review-border bg-[#0b1016] px-2.5 py-2 text-sm leading-6 text-review-text outline-none focus:border-review-accent"
              placeholder="Optional extra instructions to include after the anchored comments…"
            ></textarea>
          </div>
          <div class="border-b border-review-border p-3.5">
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Review queue
            </div>
            <div id="comment-list"></div>
          </div>
        </aside>
      </main>
    </div>

    <div
      id="comment-modal"
      class="modal-backdrop fixed inset-0 z-20 hidden items-center justify-center bg-[#010409]/80"
    >
      <div
        class="w-[min(720px,92vw)] rounded-xl border border-review-border bg-review-panel p-5 shadow-2xl"
      >
        <div class="mb-3 font-extrabold text-white">Add response comment</div>
        <div class="grid gap-3">
          <div>
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Selected text
            </div>
            <div
              id="modal-selection"
              class="max-h-[140px] overflow-auto whitespace-pre-wrap rounded-lg border border-review-border bg-[#0b1016] p-2.5 text-xs text-review-muted"
            ></div>
          </div>
          <div>
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Kind
            </div>
            <select
              id="modal-kind"
              class="w-full rounded-lg border border-review-border bg-[#0b1016] px-2.5 py-2 text-sm text-review-text outline-none focus:border-review-accent"
            >
              <option value="feedback">Feedback</option>
              <option value="question">Question</option>
              <option value="correction">Correction</option>
              <option value="preference">Preference</option>
              <option value="follow-up">Follow-up</option>
            </select>
          </div>
          <div>
            <div class="mb-2.5 text-[11px] font-extrabold tracking-wide text-review-muted uppercase">
              Comment
            </div>
            <textarea
              id="modal-comment"
              class="min-h-[88px] w-full resize-y rounded-lg border border-review-border bg-[#0b1016] px-2.5 py-2 text-sm leading-6 text-review-text outline-none focus:border-review-accent"
              placeholder="What should the assistant change, clarify, or preserve?"
            ></textarea>
          </div>
        </div>
        <div class="mt-4 flex justify-end gap-2">
          <button
            id="modal-cancel"
            class="cursor-pointer rounded-lg border border-review-border bg-review-panel-2 px-3 py-1.5 text-xs font-semibold text-review-text hover:border-review-accent/60 hover:bg-[#18212c]"
          >
            Cancel
          </button>
          <button
            id="modal-save"
            class="cursor-pointer rounded-lg border border-white/10 bg-[#238636] px-3 py-1.5 text-xs font-semibold text-white hover:bg-[#2ea043]"
          >
            Add comment
          </button>
        </div>
      </div>
    </div>

    <script id="response-review-data" type="application/json">__INLINE_DATA__</script>
    <script>__INLINE_JS__;</script>
  </body>
</html>
